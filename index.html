<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3DPrint Calc Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          },
          colors: {
            industrial: {
              orange: '#FF5C00', // Safety Orange
              blue: '#00E0FF',   // Electric Blue
              slate: {
                50: '#F8FAFC',
                400: '#94A3B8',
                500: '#64748B',
                600: '#475569',
                700: '#334155',
                800: '#1e293b',
                850: '#141E2F',
                900: '#0F172A',
                950: '#020617',
              }
            },
            primary: '#FF5C00',
            secondary: '#00E0FF',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #020617; /* Slate-950 */
      color: #F8FAFC; /* Slate-50 */
      font-family: 'Inter', sans-serif;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    /* Industrial Borders */
    .industrial-border {
      border: 1px solid #1e293b;
    }

    .industrial-border-accent {
      border: 1px solid #FF5C00;
    }

    /* Precision Typography */
    .font-technical {
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: -0.02em;
    }

    /* Scrollbars (Machinist Style) */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #020617;
    }

    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 0;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #FF5C00;
    }

    /* Mechanical Focus */
    *:focus {
      outline: 2px solid #FF5C00;
      outline-offset: 2px;
    }
  </style>

</head>

<body class="dark overflow-x-hidden selection:bg-primary selection:text-white">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
